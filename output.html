<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vael Output</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      cursor: none;
    }
    #output-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #waiting {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.15);
      font-family: monospace;
      font-size: 14px;
      letter-spacing: 2px;
    }
    #waiting .logo {
      font-size: 32px;
      margin-bottom: 16px;
      opacity: 0.3;
    }
    #fs-btn {
      position: fixed;
      top: 14px;
      right: 14px;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 6px;
      color: rgba(255,255,255,0.55);
      font-family: monospace;
      font-size: 11px;
      letter-spacing: 1px;
      padding: 6px 14px;
      cursor: pointer;
      z-index: 10;
      transition: opacity 0.3s, color 0.2s, border-color 0.2s;
    }
    #fs-btn:hover {
      color: #fff;
      border-color: rgba(255,255,255,0.5);
    }
    #fs-btn.hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
  <canvas id="output-canvas"></canvas>
  <button id="fs-btn">⛶ Fullscreen</button>
  <div id="waiting">
    <div class="logo">✦ VAEL</div>
    <div>Waiting for output…</div>
  </div>

  <script>
    /**
     * output.html — canvas-only projector output.
     *
     * The main Vael window renders to its own canvas. This window
     * receives those frames via BroadcastChannel and redraws them
     * here at full resolution.
     *
     * BroadcastChannel works between Electron windows sharing the
     * same origin (file://) — no extra IPC needed.
     */

    const canvas  = document.getElementById('output-canvas');
    const ctx     = canvas.getContext('2d');
    const waiting = document.getElementById('waiting');
    let   started = false;

    function resize() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width  = window.innerWidth  * dpr;
      canvas.height = window.innerHeight * dpr;
      canvas.style.width  = window.innerWidth  + 'px';
      canvas.style.height = window.innerHeight + 'px';
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
    }
    resize();
    window.addEventListener('resize', resize);

    // Receive frames from the main window via BroadcastChannel
    const channel = new BroadcastChannel('vael-output');

    channel.addEventListener('message', e => {
      if (e.data.type === 'frame') {
        if (!started) {
          waiting.style.display = 'none';
          started = true;
        }
        // Draw the ImageBitmap received from the main canvas
        const bmp = e.data.bitmap;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Fit the frame to fill the output canvas (cover)
        const srcW = bmp.width, srcH = bmp.height;
        const dstW = canvas.width, dstH = canvas.height;
        const scale = Math.max(dstW / srcW, dstH / srcH);
        const drawW = srcW * scale, drawH = srcH * scale;
        const dx = (dstW - drawW) / 2, dy = (dstH - drawH) / 2;

        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        ctx.drawImage(bmp, dx, dy, drawW, drawH);
        bmp.close();
      } else if (e.data.type === 'ping') {
        // Acknowledge — main window checks if output is ready
        channel.postMessage({ type: 'pong' });
      }
    });

    // Fullscreen button
    const fsBtn = document.getElementById('fs-btn');

    // In Electron, the main process already calls setFullScreen(true) — that's native
    // fullscreen which doesn't set document.fullscreenElement, so the button would
    // stay visible. Hide it immediately in Electron; show it only in browsers.
    const isElectron = !!(window.electronAPI || navigator.userAgent.includes('Electron'));
    if (isElectron) {
      fsBtn.style.display = 'none';
    } else {
      fsBtn.addEventListener('click', () => {
        document.documentElement.requestFullscreen().catch(() => {});
      });
      document.addEventListener('fullscreenchange', () => {
        fsBtn.classList.toggle('hidden', !!document.fullscreenElement);
      });
      // Auto-hide after 4 s so it doesn't linger on the projector
      setTimeout(() => fsBtn.classList.add('hidden'), 4000);
      document.addEventListener('mousemove', () => {
        fsBtn.classList.remove('hidden');
        clearTimeout(fsBtn._hideTimer);
        fsBtn._hideTimer = setTimeout(() => fsBtn.classList.add('hidden'), 3000);
      });
    }

    // Keyboard: Escape closes this window (only when not fullscreen — browser handles Escape to exit fullscreen)
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && !document.fullscreenElement) window.close();
    });
  </script>
</body>
</html>
